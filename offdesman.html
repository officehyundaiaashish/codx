<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfficeDesk PWA Init</title>
</head>
<body>
<script>
(function () {

  // ═══════════════════════════════════════════════
  // 1. ALL ICONS — Inline Base64 SVG (all PWA sizes)
  // ═══════════════════════════════════════════════
  function makeIconSVG(size) {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}">
      <rect width="${size}" height="${size}" rx="${Math.round(size*0.22)}" fill="#002C5F"/>
      <rect x="${size*0.12}" y="${size*0.22}" width="${size*0.76}" height="${size*0.44}" rx="${size*0.06}" fill="none" stroke="#ffffff" stroke-width="${size*0.06}"/>
      <path d="M${size*0.34} ${size*0.66} h${size*0.32} M${size*0.5} ${size*0.66} v${size*0.13}" stroke="#ffffff" stroke-width="${size*0.06}" stroke-linecap="round"/>
    </svg>`;
    return 'data:image/svg+xml;base64,' + btoa(svg);
  }

  const ICON_SIZES = [72, 96, 128, 144, 152, 192, 384, 512];
  const icons = ICON_SIZES.map(size => ({
    src: makeIconSVG(size),
    sizes: `${size}x${size}`,
    type: 'image/svg+xml',
    purpose: 'any maskable'
  }));

  // ═══════════════════════════════════════════════
  // 2. WEB APP MANIFEST — Injected via Blob URL
  // ═══════════════════════════════════════════════
  const manifest = {
    name: 'OfficeDesk — Utility Suite',
    short_name: 'OfficeDesk',
    description: 'Dealership utility suite for Khanna Automart — PPT, invoices, service reports.',
    start_url: './index.html',
    scope: './',
    display: 'standalone',
    orientation: 'portrait-primary',
    theme_color: '#002C5F',
    background_color: '#002C5F',
    categories: ['productivity', 'business'],
    icons: icons
  };

  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const manifestURL = URL.createObjectURL(manifestBlob);

  // Inject manifest link into parent window (index.html)
  try {
    const parentDoc = window.parent.document;
    // Remove any existing manifest link
    const existing = parentDoc.querySelector('link[rel="manifest"]');
    if (existing) existing.remove();
    const link = parentDoc.createElement('link');
    link.rel = 'manifest';
    link.href = manifestURL;
    parentDoc.head.appendChild(link);

    // Also inject apple-touch-icon for iOS
    const appleIcon = parentDoc.createElement('link');
    appleIcon.rel = 'apple-touch-icon';
    appleIcon.href = makeIconSVG(192);
    parentDoc.head.appendChild(appleIcon);

    // iOS meta tags
    const metaCapable = parentDoc.createElement('meta');
    metaCapable.name = 'apple-mobile-web-app-capable';
    metaCapable.content = 'yes';
    parentDoc.head.appendChild(metaCapable);

    const metaStatus = parentDoc.createElement('meta');
    metaStatus.name = 'apple-mobile-web-app-status-bar-style';
    metaStatus.content = 'black-translucent';
    parentDoc.head.appendChild(metaStatus);

    const metaTitle = parentDoc.createElement('meta');
    metaTitle.name = 'apple-mobile-web-app-title';
    metaTitle.content = 'OfficeDesk';
    parentDoc.head.appendChild(metaTitle);

  } catch(e) {
    // Same-origin only — if cross-origin, manifest must be in index.html directly
    console.warn('[offdesman] Could not inject manifest into parent:', e);
  }

  // ═══════════════════════════════════════════════
  // 3. SERVICE WORKER — Inline Blob Registration
  // ═══════════════════════════════════════════════
  const SW_VERSION = 'officedesk-v1';
  const CACHE_FILES = [
    './index.html',
    './alcazar.html',
    './keycode.html',
    './letthead.html',
    './pwareg.html',
    './ppt-template.js',
    './offdesman.html'
  ];

  const swCode = `
const CACHE = '${SW_VERSION}';
const CACHE_FILES = ${JSON.stringify(CACHE_FILES)};

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(cache => {
      return Promise.allSettled(
        CACHE_FILES.map(url => cache.add(url).catch(() => {}))
      );
    }).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      if (cached) return cached;
      return fetch(e.request).then(res => {
        if (res && res.status === 200 && res.type === 'basic') {
          const clone = res.clone();
          caches.open(CACHE).then(cache => cache.put(e.request, clone));
        }
        return res;
      }).catch(() => caches.match('./index.html'));
    })
  );
});

self.addEventListener('push', e => {
  const data = e.data ? e.data.json() : { title: 'OfficeDesk', body: 'You have a new update!' };
  e.waitUntil(
    self.registration.showNotification(data.title || 'OfficeDesk', {
      body: data.body || 'Check the latest updates.',
      icon: data.icon || '',
      badge: data.badge || '',
      vibrate: [200, 100, 200],
      data: { url: data.url || './' }
    })
  );
});

self.addEventListener('notificationclick', e => {
  e.notification.close();
  e.waitUntil(
    clients.matchAll({ type: 'window', includeUncontrolled: true }).then(list => {
      for (const client of list) {
        if ('focus' in client) return client.focus();
      }
      if (clients.openWindow) return clients.openWindow(e.notification.data.url || './');
    })
  );
});
`;

  // Register SW from parent window context (index.html's scope)
  const registerSW = (win) => {
    if (!('serviceWorker' in win.navigator)) {
      console.warn('[offdesman] Service Worker not supported');
      return;
    }
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swURL = URL.createObjectURL(swBlob);

    win.navigator.serviceWorker.register(swURL, { scope: './' })
      .then(reg => {
        console.log('[offdesman] SW registered:', reg.scope);
        // Check for updates every 60 seconds
        setInterval(() => reg.update(), 60000);
      })
      .catch(err => {
        console.warn('[offdesman] SW registration failed (Blob SW requires same-origin). Trying fallback.', err);
        // Fallback: post message to parent to handle SW registration
        window.parent.postMessage({ type: 'od-sw-fallback', swCode }, '*');
      });
  };

  try {
    registerSW(window.parent);
  } catch(e) {
    registerSW(window);
  }

  // ═══════════════════════════════════════════════
  // 4. NOTIFICATION PERMISSION — Ask immediately
  // ═══════════════════════════════════════════════
  const requestNotification = () => {
    if (!('Notification' in window.parent)) return;
    if (window.parent.Notification.permission === 'default') {
      // Small delay so page loads first
      setTimeout(() => {
        window.parent.Notification.requestPermission().then(perm => {
          console.log('[offdesman] Notification permission:', perm);
          if (perm === 'granted') {
            new window.parent.Notification('OfficeDesk is ready!', {
              body: 'Works offline. Add to Home Screen for app experience.',
              icon: makeIconSVG(192)
            });
          }
        });
      }, 1500);
    }
  };

  try {
    requestNotification();
  } catch(e) {
    if ('Notification' in window && Notification.permission === 'default') {
      setTimeout(() => Notification.requestPermission(), 1500);
    }
  }

  // ═══════════════════════════════════════════════
  // 5. ADD TO HOME SCREEN — Auto-trigger A2HS prompt
  // ═══════════════════════════════════════════════
  const setupA2HS = (win) => {
    let deferredPrompt = null;

    win.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log('[offdesman] A2HS prompt captured');

      // Auto-show after 2 seconds
      setTimeout(() => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(choice => {
            console.log('[offdesman] A2HS user choice:', choice.outcome);
            deferredPrompt = null;
          });
        }
      }, 2000);
    });

    win.addEventListener('appinstalled', () => {
      console.log('[offdesman] App installed successfully!');
      deferredPrompt = null;
    });
  };

  try {
    setupA2HS(window.parent);
  } catch(e) {
    setupA2HS(window);
  }

  console.log('[offdesman] PWA init complete ✓');

})();
</script>
</body>
</html>
