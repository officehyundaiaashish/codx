<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tyre/Battery Letter Head</title>

<script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.7/dist/pizzip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.49.0/build/docxtemplater.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Inter', sans-serif; 
  background: #f4f5f7; 
  color: #1f2937; 
  min-height: 100vh; 
  display: flex; 
  align-items: flex-start; 
  justify-content: center; 
  padding: 40px 20px 80px; 
}

.card { 
  background: #ffffff; 
  border-radius: 12px; 
  width: 100%; 
  max-width: 800px; /* Widened for 2-column layout */
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); 
  overflow: hidden;
}

.card-header { 
  padding: 24px 32px 20px; 
  border-bottom: 1px solid #f3f4f6; 
}
.card-header h1 { font-size: 20px; font-weight: 600; color: #111827; letter-spacing: -0.01em; }
.card-header p { font-size: 14px; color: #6b7280; margin-top: 4px; }

/* Mode picker */
.mode-wrap { padding: 20px 32px 0; display: none; }
.mode-wrap.show { display: block; }
.mode-lbl { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #9ca3af; margin-bottom: 10px; letter-spacing: 0.05em; }
.mode-btns { display: flex; gap: 12px; }
.mode-btn { 
  flex: 1; height: 44px; border-radius: 8px; border: 1px solid #e5e7eb; 
  background: #f9fafb; font-size: 14px; font-weight: 500; color: #4b5563; 
  cursor: pointer; transition: all 0.2s ease; 
}
.mode-btn:hover { border-color: #d1d5db; background: #f3f4f6; color: #111827; }
.mode-btn.active { background: #111827; border-color: #111827; color: #ffffff; }

/* History Section & Search */
.history-wrap { padding: 24px 32px 0; display: none; border-top: 1px solid #f3f4f6; margin-top: 24px; }
.history-wrap.show { display: block; }
.hist-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.hist-title { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #9ca3af; letter-spacing: 0.05em; }
.hist-clr { font-size: 13px; color: #9ca3af; cursor: pointer; background: none; border: none; transition: color 0.2s; padding: 0; }
.hist-clr:hover { color: #ef4444; }

.search-input { 
  width: 100%; height: 38px; border: 1px solid #e5e7eb; border-radius: 8px; 
  padding: 0 12px; font-size: 14px; margin-bottom: 12px; outline: none; transition: border-color 0.2s;
  background: #f9fafb;
}
.search-input:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

.hist-list { display: flex; flex-direction: column; gap: 8px; max-height: 180px; overflow-y: auto; padding-right: 4px; }
.hist-item { 
  display: flex; align-items: center; gap: 12px; padding: 12px 16px; 
  border: 1px solid #f3f4f6; border-radius: 8px; cursor: pointer; 
  background: #ffffff; transition: all 0.2s; 
}
.hist-item:hover { border-color: #d1d5db; background: #f9fafb; }
.hi-info { flex: 1; min-width: 0; }
.hi-name { font-size: 14px; font-weight: 600; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hi-meta { font-size: 12px; color: #6b7280; margin-top: 4px; display: flex; align-items: center; gap: 8px; }
.hi-mode { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
.hi-mode.tyre { background: #dbeafe; color: #1e40af; }
.hi-mode.battery { background: #fef3c7; color: #92400e; }
.hi-del { background: none; border: none; color: #d1d5db; cursor: pointer; font-size: 16px; padding: 4px; transition: color 0.2s; }
.hi-del:hover { color: #ef4444; }

/* Forms - Clean 2 Column Grid */
.form-section { padding: 24px 32px 0; }
.sec-lbl { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #9ca3af; margin-bottom: 16px; border-bottom: 1px solid #f3f4f6; padding-bottom: 8px; letter-spacing: 0.05em; }
.grid-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; }

.field-col { display: flex; flex-direction: column; gap: 6px; }
.field-col label { font-size: 13px; font-weight: 500; color: #374151; }
.field-col input { 
  height: 42px; border: 1px solid #d1d5db; border-radius: 8px; 
  padding: 0 14px; font-size: 14px; color: #111827; background: #fff; 
  transition: border-color 0.2s, box-shadow 0.2s; width: 100%; outline: none;
}
.field-col input::placeholder { color: #9ca3af; }
.field-col input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
.field-col input.pre { color: #6b7280; }

/* Date picker simplified */
.date-trigger { 
  height: 42px; display: flex; align-items: center; padding: 0 14px; 
  cursor: pointer; user-select: none; gap: 8px; border: 1px solid #d1d5db; 
  border-radius: 8px; background: #fff; transition: border-color 0.2s; position: relative;
}
.date-trigger.active { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
.dval { font-size: 14px; color: #111827; flex: 1; }
.dval.empty { color: #9ca3af; }
.darr { font-size: 10px; color: #9ca3af; transition: transform 0.2s; }
.date-trigger.active .darr { transform: rotate(180deg); }

/* Calendar Popup */
.cal-pop { 
  position: absolute; top: calc(100% + 8px); left: 0; z-index: 400; 
  background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; 
  padding: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); 
  width: 260px; opacity: 0; transform: translateY(-8px); pointer-events: none; 
  transition: all 0.2s ease; 
}
.cal-pop.open { opacity: 1; transform: translateY(0); pointer-events: all; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.mnth { font-size: 14px; font-weight: 600; color: #111827; }
.cal-nav button { background: none; border: 1px solid #e5e7eb; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #4b5563; transition: background 0.2s; }
.cal-nav button:hover { background: #f3f4f6; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.dn { font-size: 10px; font-weight: 600; text-transform: uppercase; color: #9ca3af; text-align: center; padding-bottom: 8px; }
.cd { font-size: 13px; text-align: center; padding: 8px 2px; border-radius: 6px; cursor: pointer; color: #374151; transition: all 0.15s; }
.cd:hover { background: #f3f4f6; }
.cd.sel { background: #111827 !important; color: #fff !important; font-weight: 500; }
.cd.today { font-weight: 700; color: #3b82f6; }
.cd.om { color: #d1d5db; pointer-events: none; }

/* Status & Actions */
.status { margin: 24px 32px 0; font-size: 14px; padding: 12px 16px; border-radius: 8px; display: none; font-weight: 500; }
.status.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; display: block; }
.status.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; display: block; }

.actions { display: flex; gap: 12px; padding: 24px 32px 32px; border-top: 1px solid #f3f4f6; margin-top: 24px; }
.btn { flex: 1; height: 48px; border-radius: 8px; border: none; font-size: 15px; font-family: 'Inter', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-inject { background: #111827; color: #fff; }
.btn-inject:hover { background: #374151; }
.btn-inject:disabled { background: #9ca3af; cursor: not-allowed; }
.btn-clear { background: #f3f4f6; color: #4b5563; }
.btn-clear:hover { background: #e5e7eb; }
.no-file-msg { text-align: center; font-size: 14px; color: #6b7280; padding: 40px; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>Tyre/Battery Letter Head</h1>
    <p>Fill out the form below to automatically generate your clean DOCX report.</p>
  </div>

  <div class="mode-wrap" id="modeWrap">
    <div class="mode-lbl">Select Letter Type</div>
    <div class="mode-btns">
      <button class="mode-btn active" id="modeTyre"    onclick="setMode('tyre')">Tyre Report</button>
      <button class="mode-btn"        id="modeBattery" onclick="setMode('battery')">Battery Report</button>
    </div>
  </div>

  <div class="history-wrap" id="histWrap">
    <div class="hist-header">
      <span class="hist-title">Saved Entries</span>
      <button class="hist-clr" onclick="clearAllHistory()">Clear all</button>
    </div>
    <input type="text" id="historySearch" class="search-input" placeholder="Search by Reg. No or Name..." autocomplete="off">
    <div class="hist-list" id="histList"></div>
  </div>

  <div class="status" id="status"></div>
  <div id="formWrap"></div>

  <div class="actions" id="actionsBar" style="display:none">
    <button class="btn btn-clear" id="btnClear">Clear Form</button>
    <button class="btn btn-inject" id="btnInject">Generate DOCX</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// FIELDS (Including defaults)
// ─────────────────────────────────────────────────────────────────
const TYRE_FIELDS = [
  { section:"Letter Details", fields:[
    { id:"date",       label:"Date",                 type:"date", fmt:"dash" },
    { id:"recipient",  label:"Recipient (To)",       type:"text"  },
    { id:"subject",    label:"Subject",              type:"text", def:"Tyre Buldge Problem While Driving" }
  ]},
  { section:"Dealer & Customer Details", fields:[
    { id:"dealerCode", label:"Dealer Code",          type:"text"  },
    { id:"dealerName", label:"Dealer Name",          type:"text"  },
    { id:"saleDate",   label:"Sale Date",            type:"date", fmt:"slash" },
    { id:"custName",   label:"Customer Name",        type:"text"  },
    { id:"custPhone",  label:"Contact Number",       type:"text"  }
  ]},
  { section:"Vehicle Details", fields:[
    { id:"regNo",      label:"Registration No.",     type:"text"  },
    { id:"vehMake",    label:"Vehicle Make",         type:"text"  },
    { id:"chassis",    label:"Chassis No.",          type:"text"  },
    { id:"mileage",    label:"Mileage at Complaint", type:"text"  }
  ]},
  { section:"Tyre Details", fields:[
    { id:"tyreMake",   label:"Tyre Make",            type:"text"  },
    { id:"numItems",   label:"Number of Tyres",      type:"text"  },
    { id:"tyreSpec",   label:"Tyre Specification",   type:"text"  },
    { id:"tyrePos",    label:"Tyre Position",        type:"text"  },
    { id:"issue",      label:"Issue Reported",       type:"text"  }
  ]},
  { section:"Service Manager", fields:[
    { id:"mgName",     label:"Manager Name",         type:"text", def:"NARENDRA KUMAR" },
    { id:"mgDealer",   label:"Dealership",           type:"text", def:"KHANNA AUTOMART PVT LTD" }
  ]}
];

const BATTERY_FIELDS = [
  { section:"Letter Details", fields:[
    { id:"date",       label:"Date",                 type:"date", fmt:"dash" },
    { id:"recipient",  label:"Recipient (To)",       type:"text"  },
    { id:"subject",    label:"Subject",              type:"text", def:"Vehicle starting problem issue." }
  ]},
  { section:"Dealer & Customer Details", fields:[
    { id:"dealerCode", label:"Dealer Code",          type:"text"  },
    { id:"dealerName", label:"Dealer Name",          type:"text"  },
    { id:"saleDate",   label:"Sale Date",            type:"date", fmt:"slash" },
    { id:"custName",   label:"Customer Name",        type:"text"  },
    { id:"custPhone",  label:"Contact Number",       type:"text"  }
  ]},
  { section:"Vehicle Details", fields:[
    { id:"regNo",      label:"Registration No.",     type:"text"  },
    { id:"vehMake",    label:"Vehicle Make",         type:"text"  },
    { id:"chassis",    label:"Chassis No.",          type:"text"  },
    { id:"mileage",    label:"Mileage at Complaint", type:"text"  }
  ]},
  { section:"Battery Details", fields:[
    { id:"battMake",   label:"Battery Make",         type:"text"  },
    { id:"battSerial", label:"Battery Serial",       type:"text"  },
    { id:"battSpec",   label:"Battery Specification",type:"text"  },
    { id:"issue",      label:"Issue Reported",       type:"text"  }
  ]},
  { section:"Service Manager", fields:[
    { id:"mgName",     label:"Manager Name",         type:"text", def:"NARENDRA KUMAR" },
    { id:"mgDealer",   label:"Dealership",           type:"text", def:"KHANNA AUTOMART PVT LTD" }
  ]}
];

// ─────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────
let templateBuffer = null;
let currentMode  = 'tyre';
const CAL = {};
let HISTORY = [];
try{ HISTORY = JSON.parse(localStorage.getItem('inj_hist')||'[]'); }catch(e){}

// DOM elements
const formWrap   = document.getElementById('formWrap');
const actionsBar = document.getElementById('actionsBar');
const btnClear   = document.getElementById('btnClear');
const btnInject  = document.getElementById('btnInject');
const statusEl   = document.getElementById('status');
const modeWrap   = document.getElementById('modeWrap');
const histWrap   = document.getElementById('histWrap');
const histList   = document.getElementById('histList');
const historySearch = document.getElementById('historySearch');

// Helpers
const pad      = n => String(n).padStart(2,'0');
const fmtDash  = d => pad(d.getDate())+'-'+pad(d.getMonth()+1)+'-'+d.getFullYear();
const fmtSlash = d => pad(d.getDate())+' / '+pad(d.getMonth()+1)+' / '+d.getFullYear();
const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const getGroups= ()=> currentMode==='tyre' ? TYRE_FIELDS : BATTERY_FIELDS;
const allFields= ()=> getGroups().flatMap(g=>g.fields);
const dateFields=()=> allFields().filter(f=>f.type==='date');

// ─────────────────────────────────────────────────────────────────
// INITIALIZE & FETCH DOCUMENT ON LOAD
// ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  formWrap.innerHTML = '<div class="no-file-msg">Fetching template (head.docx)...</div>';
  try {
    const response = await fetch('head.docx');
    if (!response.ok) throw new Error('File not found');
    templateBuffer = await response.arrayBuffer();
    
    modeWrap.classList.add('show');
    actionsBar.style.display = 'flex';
    buildForm();
    renderHistory();
    clearStatus();
  } catch (err) {
    showStatus('Error: Could not load head.docx from the server.', 'error');
    formWrap.innerHTML = '<div class="no-file-msg">Template missing. Please check your repository.</div>';
  }
});

function setMode(mode){
  currentMode=mode;
  document.getElementById('modeTyre').classList.toggle('active',mode==='tyre');
  document.getElementById('modeBattery').classList.toggle('active',mode==='battery');
  if(templateBuffer) buildForm();
}

// ─────────────────────────────────────────────────────────────────
// CALENDAR LOGIC
// ─────────────────────────────────────────────────────────────────
function renderCal(id){
  const st=CAL[id], pop=document.getElementById('cp_'+id);
  if(!pop||!st) return;
  const y=st.year,m=st.month,fd=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate(),now=new Date();
  let h=`<div class="cal-nav"><button type="button" class="cpb" data-id="${id}" data-dir="-1">&#8249;</button>
    <span class="mnth">${MONTHS[m]} ${y}</span>
    <button type="button" class="cpb" data-id="${id}" data-dir="1">&#8250;</button></div>
    <div class="cal-grid">${['S','M','T','W','T','F','S'].map(x=>`<div class="dn">${x}</div>`).join('')}`;
  for(let i=0;i<fd;i++) h+=`<div class="cd om">${prev-fd+1+i}</div>`;
  for(let d=1;d<=dim;d++){
    const iT=d===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
    const iS=st.date&&d===st.date.getDate()&&m===st.date.getMonth()&&y===st.date.getFullYear();
    h+=`<div class="cd${iT?' today':''}${iS?' sel':''}" data-id="${id}" data-d="${d}">${d}</div>`;
  }
  h+='</div>';
  pop.innerHTML=h;
  pop.querySelectorAll('.cpb').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const s=CAL[b.dataset.id],dir=parseInt(b.dataset.dir);
    s.month+=dir; if(s.month<0){s.month=11;s.year--;} if(s.month>11){s.month=0;s.year++;}
    renderCal(b.dataset.id);
  }));
  pop.querySelectorAll('.cd:not(.om)').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const s=CAL[el.dataset.id];
    s.date=new Date(s.year,s.month,parseInt(el.dataset.d));
    const f=allFields().find(f=>f.id===el.dataset.id);
    const dv=document.getElementById('dv_'+el.dataset.id);
    if(dv){ dv.textContent=f.fmt==='slash'?fmtSlash(s.date):fmtDash(s.date); dv.classList.remove('empty'); }
    closeCal(el.dataset.id); renderCal(el.dataset.id);
  }));
}
function openCal(id){
  closeAllCals();
  const ref=CAL[id]?.date||new Date();
  if(!CAL[id]) CAL[id]={date:null,open:false};
  CAL[id].year=ref.getFullYear(); CAL[id].month=ref.getMonth();
  renderCal(id);
  document.getElementById('cp_'+id)?.classList.add('open');
  document.getElementById('dt_'+id)?.classList.add('active');
  CAL[id].open=true;
}
function closeCal(id){
  document.getElementById('cp_'+id)?.classList.remove('open');
  document.getElementById('dt_'+id)?.classList.remove('active');
  if(CAL[id]) CAL[id].open=false;
}
function closeAllCals(){ dateFields().forEach(f=>closeCal(f.id)); }
document.addEventListener('click',closeAllCals);

// ─────────────────────────────────────────────────────────────────
// FORM BUILDER (Using CSS Grid layout)
// ─────────────────────────────────────────────────────────────────
function buildForm(){
  formWrap.innerHTML='';
  getGroups().forEach(group=>{
    const sec=document.createElement('div'); sec.className='form-section';
    const lbl=document.createElement('div'); lbl.className='sec-lbl'; lbl.textContent=group.section;
    sec.appendChild(lbl);
    
    const grid=document.createElement('div'); grid.className='grid-wrap';
    
    group.fields.forEach(f=>{
      const col = document.createElement('div'); col.className = 'field-col';
      if(f.type==='date'){
        if(!CAL[f.id]) CAL[f.id]={date:null,open:false,year:new Date().getFullYear(),month:new Date().getMonth()};
        col.innerHTML=`
          <label>${f.label}</label>
          <div style="position:relative;">
            <div class="date-trigger" id="dt_${f.id}">
              <span class="dval empty" id="dv_${f.id}">Pick a date</span>
              <span class="darr">&#x25BE;</span>
            </div>
            <div class="cal-pop" id="cp_${f.id}"></div>
          </div>`;
        grid.appendChild(col);
        requestAnimationFrame(()=>{
          document.getElementById('dt_'+f.id)?.addEventListener('click',e=>{
            e.stopPropagation(); CAL[f.id]?.open?closeCal(f.id):openCal(f.id);
          });
        });
      } else {
        const label=document.createElement('label'); label.htmlFor=f.id; label.textContent=f.label;
        const input=document.createElement('input'); input.type='text'; input.id=f.id;
        if(f.def){ input.value=f.def; input.classList.add('pre'); input.addEventListener('focus',()=>input.classList.remove('pre')); }
        else input.placeholder='Enter value\u2026';
        
        // Make Subject take up full width (span 2 columns) if needed, but lets keep it uniform for now.
        if (f.id === 'subject') col.style.gridColumn = '1 / -1'; 
        
        col.appendChild(label); col.appendChild(input); grid.appendChild(col);
      }
    });
    sec.appendChild(grid);
    formWrap.appendChild(sec);
  });
}

btnClear.addEventListener('click',()=>{
  allFields().forEach(f=>{
    if(f.type==='date'){
      if(CAL[f.id]) Object.assign(CAL[f.id],{date:null,open:false,year:new Date().getFullYear(),month:new Date().getMonth()});
      const dv=document.getElementById('dv_'+f.id);
      if(dv){dv.textContent='Pick a date';dv.classList.add('empty');} closeCal(f.id);
    } else {
      const inp=document.getElementById(f.id);
      if(!inp) return;
      if(f.def){inp.value=f.def;inp.classList.add('pre');} else inp.value='';
    }
  });
  clearStatus();
});

// ─────────────────────────────────────────────────────────────────
// DOCXTEMPLATER LOGIC 
// ─────────────────────────────────────────────────────────────────
btnInject.addEventListener('click',async()=>{
  if(!templateBuffer){showStatus('Template not loaded yet.','error');return;}

  const data = {};
  const histEntry = {mode: currentMode};

  data.isTyre = (currentMode === 'tyre');
  data.isBattery = (currentMode === 'battery');

  allFields().forEach(f => {
    if(f.type === 'date') {
      const st = CAL[f.id];
      const val = (st && st.date) ? (f.fmt === 'slash' ? fmtSlash(st.date) : fmtDash(st.date)) : '';
      data[f.id] = val; 
      if(val) histEntry[f.id] = val;
    } else {
      const val = document.getElementById(f.id)?.value?.trim() || '';
      data[f.id] = val; 
      if(val) histEntry[f.id] = val;
    }
  });

  if(Object.keys(histEntry).length <= 2){showStatus('Fill in at least one field.','error');return;}

  btnInject.disabled=true; btnInject.textContent='Processing\u2026'; clearStatus();

  try {
    const zip = new window.PizZip(templateBuffer.slice(0)); 
    
    const doc = new window.docxtemplater(zip, { 
        paragraphLoop: true, 
        linebreaks: true,
        nullGetter: function() { return ""; }
    });

    doc.render(data);

    const blob = doc.getZip().generate({
        type: "blob",
        mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    });

    // Generate Dynamic Filename: Regno_Make_lethead.docx
    const regNoClean = (data.regNo || 'NoReg').replace(/[^a-zA-Z0-9]/g, '');
    const makeClean = currentMode === 'tyre' 
        ? (data.tyreMake || 'Make').replace(/[^a-zA-Z0-9]/g, '') 
        : (data.battMake || 'Make').replace(/[^a-zA-Z0-9]/g, '');
        
    const name = `${regNoClean}_${makeClean}_lethead.docx`;
    saveAs(blob, name);
    
    showStatus('\u2713 Downloaded: '+name,'success');
    saveHistory(histEntry);
  } catch(err) {
    showStatus('Error: '+err.message,'error'); console.error(err);
  } finally {
    btnInject.disabled=false; btnInject.textContent='Generate DOCX';
  }
});

// ─────────────────────────────────────────────────────────────────
// HISTORY & SEARCH LOGIC
// ─────────────────────────────────────────────────────────────────
function saveHistory(entry){
  // Check if an entry with this RegNo already exists, if so remove it to push the new one to the top
  if(entry.regNo) {
    HISTORY = HISTORY.filter(h => h.regNo !== entry.regNo);
  }
  HISTORY.unshift(entry);
  if(HISTORY.length>50) HISTORY=HISTORY.slice(0,50); // Keep last 50
  try{localStorage.setItem('inj_hist',JSON.stringify(HISTORY));}catch(e){}
  renderHistory();
}
function deleteHistory(idx){
  HISTORY.splice(idx,1);
  try{localStorage.setItem('inj_hist',JSON.stringify(HISTORY));}catch(e){}
  renderHistory();
}
function clearAllHistory(){
  HISTORY=[];
  try{localStorage.removeItem('inj_hist');}catch(e){}
  historySearch.value = '';
  renderHistory();
}

// Live search listener
historySearch.addEventListener('input', () => renderHistory(historySearch.value));

function renderHistory(filterText = ''){
  if(!HISTORY.length){ histWrap.classList.remove('show'); return; }
  histWrap.classList.add('show');
  histList.innerHTML='';
  
  const searchLower = filterText.toLowerCase().trim();

  HISTORY.forEach((entry, originalIdx)=>{
    // Title is now primarily Registration Number
    const primaryName = entry.regNo || entry.custName || 'Unknown Registration';
    const subMeta = entry.custName || entry.date || '';
    
    // Search filtering
    if(searchLower) {
        const searchString = `${primaryName} ${subMeta} ${entry.mode}`.toLowerCase();
        if(!searchString.includes(searchLower)) return; // Skip if it doesn't match
    }

    const item=document.createElement('div'); item.className='hist-item';
    item.innerHTML=`<div class="hi-info">
      <div class="hi-name">${escHtml(primaryName)}</div>
      <div class="hi-meta"><span class="hi-mode ${entry.mode}">${entry.mode}</span>${escHtml(subMeta)}</div>
    </div><button type="button" class="hi-del" data-idx="${originalIdx}">&#x2715;</button>`;
    
    item.querySelector('.hi-del').addEventListener('click',e=>{
        e.stopPropagation();
        deleteHistory(originalIdx);
    });
    item.addEventListener('click',()=>fillFromHistory(entry));
    histList.appendChild(item);
  });
  
  if(histList.innerHTML === '') {
      histList.innerHTML = '<div style="text-align:center;font-size:12px;color:#9ca3af;padding:10px;">No matching entries found.</div>';
  }
}

function fillFromHistory(entry){
  if(entry.mode) setMode(entry.mode);
  dateFields().forEach(f=>{
    const val=entry[f.id];
    if(!val) return;
    let d;
    if(f.fmt==='slash'){ const p=val.split(' / '); d=new Date(+p[2],+p[1]-1,+p[0]); }
    else { const p=val.split('-'); d=new Date(+p[2],+p[1]-1,+p[0]); }
    if(isNaN(d)) return;
    if(!CAL[f.id]) CAL[f.id]={};
    Object.assign(CAL[f.id],{date:d,year:d.getFullYear(),month:d.getMonth(),open:false});
    const dv=document.getElementById('dv_'+f.id);
    if(dv){ dv.textContent=val; dv.classList.remove('empty'); }
  });
  allFields().filter(f=>f.type==='text').forEach(f=>{
    const inp=document.getElementById(f.id);
    if(inp&&entry[f.id]!==undefined){ inp.value=entry[f.id]; inp.classList.remove('pre'); }
  });
  clearStatus();
  
  // Optional: Scroll down to the form after clicking
  formWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showStatus(m,t){statusEl.textContent=m;statusEl.className='status '+t;}
function clearStatus(){statusEl.textContent='';statusEl.className='status';}

renderHistory();
</script>
