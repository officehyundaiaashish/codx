<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tyre/Battery Letter Head</title>

<script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.7/dist/pizzip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.49.0/build/docxtemplater.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#eae9e3;color:#1a1a1a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:36px 14px 60px}
.card{background:#fff;border:1px solid #dedad2;border-radius:13px;width:100%;max-width:570px;box-shadow:0 2px 24px rgba(0,0,0,0.08)}
.card-header{padding:18px 22px 14px;border-bottom:1px solid #eeece6}
.card-header h1{font-size:14px;font-weight:500;letter-spacing:.01em}
.card-header p{font-size:10.5px;color:#bbb;margin-top:2px}

/* Mode picker */
.mode-wrap{margin:14px 22px 0;display:none}
.mode-wrap.show{display:block}
.mode-lbl{font-size:9.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#bbb;margin-bottom:7px}
.mode-btns{display:flex;gap:6px}
.mode-btn{flex:1;height:33px;border-radius:7px;border:1.5px solid #e0ded6;background:#faf9f6;font-size:12px;font-family:'DM Sans',sans-serif;color:#777;cursor:pointer;transition:all .18s;font-weight:500}
.mode-btn:hover{border-color:#aaa;color:#333}
.mode-btn.active{background:#1a1a1a;border-color:#1a1a1a;color:#fff}

/* History */
.history-wrap{margin:14px 22px 0;display:none}
.history-wrap.show{display:block}
.hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.hist-title{font-size:9.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#bbb}
.hist-clr{font-size:10px;color:#ccc;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;transition:color .15s}
.hist-clr:hover{color:#d00}
.hist-list{display:flex;flex-direction:column;gap:4px;max-height:150px;overflow-y:auto}
.hist-item{display:flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid #eeece6;border-radius:6px;cursor:pointer;background:#faf9f6;transition:border-color .15s,background .15s}
.hist-item:hover{border-color:#bbb;background:#f2f0eb}
.hi-info{flex:1;min-width:0}
.hi-name{font-size:11px;font-weight:500;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-meta{font-size:9.5px;color:#bbb;margin-top:1px}
.hi-mode{font-size:8.5px;padding:1px 5px;border-radius:3px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-right:4px}
.hi-mode.tyre{background:#e8f4ff;color:#3a7abf}
.hi-mode.battery{background:#fff3e0;color:#c07a20}
.hi-del{background:none;border:none;color:#ddd;cursor:pointer;font-size:12px;line-height:1;padding:2px 4px;transition:color .12s}
.hi-del:hover{color:#d00}

/* Form */
.form-section{padding:14px 22px 0}
.sec-lbl{font-size:9.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#c0bdb6;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #f0ede6}
.field-row{display:flex;align-items:center;margin-bottom:5px;border:1px solid #e5e3dc;border-radius:7px;overflow:hidden;background:#fff;transition:border-color .18s,box-shadow .18s}
.field-row:focus-within{border-color:#aaa;box-shadow:0 0 0 3px rgba(0,0,0,0.04)}
.field-row label{font-size:10.5px;color:#999;padding:0 10px;white-space:nowrap;min-width:152px;background:#faf9f6;border-right:1px solid #eeece6;height:34px;display:flex;align-items:center;flex-shrink:0}
.field-row input{flex:1;border:none;outline:none;font-size:12px;font-family:'DM Mono',monospace;padding:0 10px;height:34px;color:#1a1a1a;background:transparent}
.field-row input::placeholder{color:#d0cec8;font-family:'DM Sans',sans-serif;font-size:11px}
.field-row input.pre{color:#bbb}

/* Date picker */
.date-row{display:flex;align-items:center;margin-bottom:5px;border:1px solid #e5e3dc;border-radius:7px;background:#fff;transition:border-color .18s,box-shadow .18s;position:relative;overflow:visible}
.date-row.active{border-color:#aaa;box-shadow:0 0 0 3px rgba(0,0,0,0.04)}
.dr-label{font-size:10.5px;color:#999;padding:0 10px;white-space:nowrap;min-width:152px;background:#faf9f6;border-right:1px solid #eeece6;height:34px;display:flex;align-items:center;flex-shrink:0;border-radius:7px 0 0 7px}
.date-trigger{flex:1;height:34px;display:flex;align-items:center;padding:0 10px;cursor:pointer;user-select:none;gap:5px}
.dval{font-size:12px;font-family:'DM Mono',monospace;color:#1a1a1a;flex:1}
.dval.empty{color:#d0cec8;font-family:'DM Sans',sans-serif;font-size:11px}
.darr{font-size:9px;opacity:.3;transition:opacity .15s,transform .22s cubic-bezier(.4,0,.2,1)}
.date-row.active .darr{opacity:.65;transform:rotate(180deg)}
.cal-pop{position:absolute;top:calc(100% + 5px);left:0;z-index:400;background:#fff;border:1px solid #dedad2;border-radius:10px;padding:12px;box-shadow:0 10px 36px rgba(0,0,0,0.13);width:234px;opacity:0;transform:translateY(-6px) scale(.983);pointer-events:none;transition:opacity .16s cubic-bezier(.4,0,.2,1),transform .16s cubic-bezier(.4,0,.2,1)}
.cal-pop.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mnth{font-size:11px;font-weight:500;color:#222;letter-spacing:.02em}
.cal-nav button{background:none;border:1px solid #e5e3dc;border-radius:5px;width:22px;height:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#666;transition:background .1s;line-height:1}
.cal-nav button:hover{background:#f5f4f0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.dn{font-size:8px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#ccc;text-align:center;padding:2px 0 5px}
.cd{font-size:11px;font-family:'DM Mono',monospace;text-align:center;padding:5px 1px;border-radius:5px;cursor:pointer;color:#222;transition:background .08s,color .08s,transform .1s}
.cd:hover{background:#f0ede6;transform:scale(1.1)}
.cd.sel{background:#1a1a1a!important;color:#fff!important;transform:none!important}
.cd.today{font-weight:700;color:#555}
.cd.om{color:#e0ded6;cursor:default;pointer-events:none}

.status{margin:0 22px 10px;font-size:11px;padding:7px 11px;border-radius:6px;display:none}
.status.error{background:#fff0f0;color:#c00;border:1px solid #fcc;display:block}
.status.success{background:#f2fbf4;color:#166534;border:1px solid #c3f0cd;display:block}
.actions{display:flex;gap:7px;padding:16px 22px 20px}
.btn{flex:1;height:35px;border-radius:7px;border:none;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:background .15s,transform .1s}
.btn:active{transform:scale(.98)}
.btn-inject{background:#1a1a1a;color:#fff;letter-spacing:.02em}
.btn-inject:hover{background:#0a0a0a}
.btn-inject:disabled{background:#ccc;cursor:not-allowed;transform:none}
.btn-clear{background:#f0ede6;color:#777}
.btn-clear:hover{background:#e5e2da}
.no-file-msg{text-align:center;font-size:11.5px;color:#ccc;padding:20px 22px 22px}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>Tyre/Battery Letter Head</h1>
    <p>Fill out the form below to automatically generate your DOCX report.</p>
  </div>

  <div class="mode-wrap" id="modeWrap">
    <div class="mode-lbl">Letter Type</div>
    <div class="mode-btns">
      <button class="mode-btn active" id="modeTyre"    onclick="setMode('tyre')">🔵 &nbsp;Tyre</button>
      <button class="mode-btn"        id="modeBattery" onclick="setMode('battery')">🟡 &nbsp;Battery</button>
    </div>
  </div>

  <div class="history-wrap" id="histWrap">
    <div class="hist-header">
      <span class="hist-title">Previous Entries</span>
      <button class="hist-clr" onclick="clearAllHistory()">Clear all</button>
    </div>
    <div class="hist-list" id="histList"></div>
  </div>

  <div class="status" id="status"></div>
  <div id="formWrap"></div>

  <div class="actions" id="actionsBar" style="display:none">
    <button class="btn btn-clear" id="btnClear">Clear</button>
    <button class="btn btn-inject" id="btnInject">Generate DOCX</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// FIELDS (Including defaults)
// ─────────────────────────────────────────────────────────────────
const TYRE_FIELDS = [
  { section:"Letter Details", fields:[
    { id:"date",       label:"Date",                 type:"date", fmt:"dash" },
    { id:"recipient",  label:"Recipient (To)",       type:"text"  },
    { id:"subject",    label:"Subject",              type:"text", def:"Tyre Buldge Problem While Driving" }
  ]},
  { section:"Dealer Details", fields:[
    { id:"dealerCode", label:"Dealer Code",          type:"text"  },
    { id:"dealerName", label:"Dealer Name",          type:"text"  }
  ]},
  { section:"Sale Details", fields:[
    { id:"saleDate",   label:"Sale Date",            type:"date", fmt:"slash" }
  ]},
  { section:"Customer Details", fields:[
    { id:"custName",   label:"Customer Name",        type:"text"  },
    { id:"custPhone",  label:"Contact Number",       type:"text"  }
  ]},
  { section:"Vehicle Details", fields:[
    { id:"vehMake",    label:"Vehicle Make",         type:"text"  },
    { id:"chassis",    label:"Chassis No.",          type:"text"  },
    { id:"regNo",      label:"Registration No.",     type:"text"  },
    { id:"mileage",    label:"Mileage at Complaint", type:"text"  }
  ]},
  { section:"Tyre Details", fields:[
    { id:"tyreMake",   label:"Tyre Make",            type:"text"  },
    { id:"numItems",   label:"Number of Tyres",      type:"text"  },
    { id:"tyreSpec",   label:"Tyre Specification",   type:"text"  },
    { id:"tyrePos",    label:"Tyre Position",        type:"text"  },
    { id:"issue",      label:"Issue Reported",       type:"text"  }
  ]},
  { section:"Service Manager", fields:[
    { id:"mgName",     label:"Manager Name",         type:"text", def:"NARENDRA KUMAR" },
    { id:"mgDealer",   label:"Dealership",           type:"text", def:"KHANNA AUTOMART PVT LTD" }
  ]}
];

const BATTERY_FIELDS = [
  { section:"Letter Details", fields:[
    { id:"date",       label:"Date",                 type:"date", fmt:"dash" },
    { id:"recipient",  label:"Recipient (To)",       type:"text"  },
    { id:"subject",    label:"Subject",              type:"text", def:"Vehicle starting problem issue." }
  ]},
  { section:"Dealer Details", fields:[
    { id:"dealerCode", label:"Dealer Code",          type:"text"  },
    { id:"dealerName", label:"Dealer Name",          type:"text"  }
  ]},
  { section:"Sale Details", fields:[
    { id:"saleDate",   label:"Sale Date",            type:"date", fmt:"slash" }
  ]},
  { section:"Customer Details", fields:[
    { id:"custName",   label:"Customer Name",        type:"text"  },
    { id:"custPhone",  label:"Contact Number",       type:"text"  }
  ]},
  { section:"Vehicle Details", fields:[
    { id:"vehMake",    label:"Vehicle Make",         type:"text"  },
    { id:"chassis",    label:"Chassis No.",          type:"text"  },
    { id:"regNo",      label:"Registration No.",     type:"text"  },
    { id:"mileage",    label:"Mileage at Complaint", type:"text"  }
  ]},
  { section:"Battery Details", fields:[
    { id:"battMake",   label:"Battery Make",         type:"text"  },
    { id:"battSerial", label:"Battery Serial",       type:"text"  },
    { id:"battSpec",   label:"Battery Specification",type:"text"  },
    { id:"issue",      label:"Issue Reported",       type:"text"  }
  ]},
  { section:"Service Manager", fields:[
    { id:"mgName",     label:"Manager Name",         type:"text", def:"NARENDRA KUMAR" },
    { id:"mgDealer",   label:"Dealership",           type:"text", def:"KHANNA AUTOMART PVT LTD" }
  ]}
];

// ─────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────
let templateBuffer = null; // Stores the fetched head.docx
let currentMode  = 'tyre';
const CAL = {};
let HISTORY = [];
try{ HISTORY = JSON.parse(localStorage.getItem('inj_hist')||'[]'); }catch(e){}

// DOM elements
const formWrap   = document.getElementById('formWrap');
const actionsBar = document.getElementById('actionsBar');
const btnClear   = document.getElementById('btnClear');
const btnInject  = document.getElementById('btnInject');
const statusEl   = document.getElementById('status');
const modeWrap   = document.getElementById('modeWrap');
const histWrap   = document.getElementById('histWrap');
const histList   = document.getElementById('histList');

// Helpers
const pad      = n => String(n).padStart(2,'0');
const fmtDash  = d => pad(d.getDate())+'-'+pad(d.getMonth()+1)+'-'+d.getFullYear();
const fmtSlash = d => pad(d.getDate())+' / '+pad(d.getMonth()+1)+' / '+d.getFullYear();
const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const getGroups= ()=> currentMode==='tyre' ? TYRE_FIELDS : BATTERY_FIELDS;
const allFields= ()=> getGroups().flatMap(g=>g.fields);
const dateFields=()=> allFields().filter(f=>f.type==='date');

// ─────────────────────────────────────────────────────────────────
// INITIALIZE & FETCH DOCUMENT ON LOAD
// ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  formWrap.innerHTML = '<div class="no-file-msg" style="color:#666;">Loading template (head.docx)...</div>';
  try {
    // Automatically fetches head.docx from the same folder
    const response = await fetch('head.docx');
    if (!response.ok) throw new Error('File not found');
    templateBuffer = await response.arrayBuffer();
    
    // Once loaded, show the UI
    modeWrap.classList.add('show');
    actionsBar.style.display = 'flex';
    buildForm();
    renderHistory();
    clearStatus();
  } catch (err) {
    showStatus('Error: Could not load head.docx. Make sure it is uploaded in the same GitHub folder.', 'error');
    formWrap.innerHTML = '<div class="no-file-msg">Template missing. Please check your repository.</div>';
  }
});

function setMode(mode){
  currentMode=mode;
  document.getElementById('modeTyre').classList.toggle('active',mode==='tyre');
  document.getElementById('modeBattery').classList.toggle('active',mode==='battery');
  if(templateBuffer) buildForm();
}

// ─────────────────────────────────────────────────────────────────
// CALENDAR & UI LOGIC
// ─────────────────────────────────────────────────────────────────
function renderCal(id){
  const st=CAL[id], pop=document.getElementById('cp_'+id);
  if(!pop||!st) return;
  const y=st.year,m=st.month,fd=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate(),now=new Date();
  let h=`<div class="cal-nav"><button class="cpb" data-id="${id}" data-dir="-1">&#8249;</button>
    <span class="mnth">${MONTHS[m]} ${y}</span>
    <button class="cpb" data-id="${id}" data-dir="1">&#8250;</button></div>
    <div class="cal-grid">${['S','M','T','W','T','F','S'].map(x=>`<div class="dn">${x}</div>`).join('')}`;
  for(let i=0;i<fd;i++) h+=`<div class="cd om">${prev-fd+1+i}</div>`;
  for(let d=1;d<=dim;d++){
    const iT=d===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
    const iS=st.date&&d===st.date.getDate()&&m===st.date.getMonth()&&y===st.date.getFullYear();
    h+=`<div class="cd${iT?' today':''}${iS?' sel':''}" data-id="${id}" data-d="${d}">${d}</div>`;
  }
  h+='</div>';
  pop.innerHTML=h;
  pop.querySelectorAll('.cpb').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const s=CAL[b.dataset.id],dir=parseInt(b.dataset.dir);
    s.month+=dir; if(s.month<0){s.month=11;s.year--;} if(s.month>11){s.month=0;s.year++;}
    renderCal(b.dataset.id);
  }));
  pop.querySelectorAll('.cd:not(.om)').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const s=CAL[el.dataset.id];
    s.date=new Date(s.year,s.month,parseInt(el.dataset.d));
    const f=allFields().find(f=>f.id===el.dataset.id);
    const dv=document.getElementById('dv_'+el.dataset.id);
    if(dv){ dv.textContent=f.fmt==='slash'?fmtSlash(s.date):fmtDash(s.date); dv.classList.remove('empty'); }
    closeCal(el.dataset.id); renderCal(el.dataset.id);
  }));
}
function openCal(id){
  closeAllCals();
  const ref=CAL[id]?.date||new Date();
  if(!CAL[id]) CAL[id]={date:null,open:false};
  CAL[id].year=ref.getFullYear(); CAL[id].month=ref.getMonth();
  renderCal(id);
  document.getElementById('cp_'+id)?.classList.add('open');
  document.getElementById('dr_'+id)?.classList.add('active');
  CAL[id].open=true;
}
function closeCal(id){
  document.getElementById('cp_'+id)?.classList.remove('open');
  document.getElementById('dr_'+id)?.classList.remove('active');
  if(CAL[id]) CAL[id].open=false;
}
function closeAllCals(){ dateFields().forEach(f=>closeCal(f.id)); }
document.addEventListener('click',closeAllCals);

function buildForm(){
  formWrap.innerHTML='';
  getGroups().forEach(group=>{
    const sec=document.createElement('div'); sec.className='form-section';
    const lbl=document.createElement('div'); lbl.className='sec-lbl'; lbl.textContent=group.section;
    sec.appendChild(lbl);
    group.fields.forEach(f=>{
      if(f.type==='date'){
        if(!CAL[f.id]) CAL[f.id]={date:null,open:false,year:new Date().getFullYear(),month:new Date().getMonth()};
        const row=document.createElement('div'); row.className='date-row'; row.id='dr_'+f.id;
        row.innerHTML=`<div class="dr-label">${f.label}</div>
          <div class="date-trigger" id="dt_${f.id}">
            <span class="dval empty" id="dv_${f.id}">Pick a date</span>
            <span class="darr">&#x25BE;</span>
          </div><div class="cal-pop" id="cp_${f.id}"></div>`;
        sec.appendChild(row);
        requestAnimationFrame(()=>{
          document.getElementById('dt_'+f.id)?.addEventListener('click',e=>{
            e.stopPropagation(); CAL[f.id]?.open?closeCal(f.id):openCal(f.id);
          });
        });
      } else {
        const row=document.createElement('div'); row.className='field-row';
        const label=document.createElement('label'); label.htmlFor=f.id; label.textContent=f.label;
        const input=document.createElement('input'); input.type='text'; input.id=f.id;
        if(f.def){ input.value=f.def; input.classList.add('pre'); input.addEventListener('focus',()=>input.classList.remove('pre')); }
        else input.placeholder='Enter value\u2026';
        row.appendChild(label); row.appendChild(input); sec.appendChild(row);
      }
    });
    formWrap.appendChild(sec);
  });
  const sp=document.createElement('div'); sp.style.height='4px'; formWrap.appendChild(sp);
}

btnClear.addEventListener('click',()=>{
  allFields().forEach(f=>{
    if(f.type==='date'){
      if(CAL[f.id]) Object.assign(CAL[f.id],{date:null,open:false,year:new Date().getFullYear(),month:new Date().getMonth()});
      const dv=document.getElementById('dv_'+f.id);
      if(dv){dv.textContent='Pick a date';dv.classList.add('empty');} closeCal(f.id);
    } else {
      const inp=document.getElementById(f.id);
      if(!inp) return;
      if(f.def){inp.value=f.def;inp.classList.add('pre');} else inp.value='';
    }
  });
  clearStatus();
});

// ─────────────────────────────────────────────────────────────────
// DOCXTEMPLATER LOGIC (Handles empty fields perfectly)
// ─────────────────────────────────────────────────────────────────
btnInject.addEventListener('click',async()=>{
  if(!templateBuffer){showStatus('Template not loaded yet.','error');return;}

  const data = {};
  const histEntry = {mode: currentMode};

  // 1. ADD CONDITIONAL LOGIC BASED ON MODE
  data.isTyre = (currentMode === 'tyre');
  data.isBattery = (currentMode === 'battery');

  // 2. GATHER FORM DATA (Replaces blank fields with an empty string)
  allFields().forEach(f => {
    if(f.type === 'date') {
      const st = CAL[f.id];
      const val = (st && st.date) ? (f.fmt === 'slash' ? fmtSlash(st.date) : fmtDash(st.date)) : '';
      data[f.id] = val; // Ensures it's an empty string if blank
      if(val) histEntry[f.id] = val;
    } else {
      const val = document.getElementById(f.id)?.value?.trim() || '';
      data[f.id] = val; // Ensures it's an empty string if blank
      if(val) histEntry[f.id] = val;
    }
  });

  // Only proceed if they filled out something other than the defaults
  if(Object.keys(histEntry).length <= 2){showStatus('Fill in at least one field.','error');return;}

  btnInject.disabled=true; btnInject.textContent='Processing\u2026'; clearStatus();

  try {
    // Clone the buffer so we can reuse it later without reloading the page
    const zip = new window.PizZip(templateBuffer.slice(0)); 
    
    const doc = new window.docxtemplater(zip, { 
        paragraphLoop: true, 
        linebreaks: true,
        // This is the magic rule that stops "undefined" from printing
        nullGetter: function() {
            return ""; 
        }
    });

    doc.render(data);

    const blob = doc.getZip().generate({
        type: "blob",
        mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    });

    const reg = data.regNo ? `_${data.regNo}` : '';
    const name = `LetterHead_${currentMode}${reg}_filled.docx`;
    saveAs(blob, name);
    
    showStatus('\u2713 Downloaded: '+name,'success');
    saveHistory(histEntry);
  } catch(err) {
    showStatus('Error: '+err.message,'error'); console.error(err);
  } finally {
    btnInject.disabled=false; btnInject.textContent='Generate DOCX';
  }
});

// ─────────────────────────────────────────────────────────────────
// HISTORY LOGIC
// ─────────────────────────────────────────────────────────────────
function saveHistory(entry){
  HISTORY.unshift(entry);
  if(HISTORY.length>30) HISTORY=HISTORY.slice(0,30);
  try{localStorage.setItem('inj_hist',JSON.stringify(HISTORY));}catch(e){}
  renderHistory();
}
function deleteHistory(idx){
  HISTORY.splice(idx,1);
  try{localStorage.setItem('inj_hist',JSON.stringify(HISTORY));}catch(e){}
  renderHistory();
}
function clearAllHistory(){
  HISTORY=[];
  try{localStorage.removeItem('inj_hist');}catch(e){}
  renderHistory();
}
function renderHistory(){
  if(!HISTORY.length){ histWrap.classList.remove('show'); return; }
  histWrap.classList.add('show');
  histList.innerHTML='';
  HISTORY.forEach((entry,i)=>{
    const item=document.createElement('div'); item.className='hist-item';
    const name=entry.custName||entry.vehMake||entry.regNo||('Entry '+(i+1));
    const meta=[entry.date||'', entry.regNo||''].filter(Boolean).join(' · ');
    item.innerHTML=`<div class="hi-info">
      <div class="hi-name">${escHtml(name)}</div>
      <div class="hi-meta"><span class="hi-mode ${entry.mode}">${entry.mode}</span>${escHtml(meta)}</div>
    </div><button class="hi-del" data-idx="${i}">&#x2715;</button>`;
    item.querySelector('.hi-del').addEventListener('click',e=>{e.stopPropagation();deleteHistory(i);});
    item.addEventListener('click',()=>fillFromHistory(entry));
    histList.appendChild(item);
  });
}
function fillFromHistory(entry){
  if(entry.mode) setMode(entry.mode);
  dateFields().forEach(f=>{
    const val=entry[f.id];
    if(!val) return;
    let d;
    if(f.fmt==='slash'){ const p=val.split(' / '); d=new Date(+p[2],+p[1]-1,+p[0]); }
    else { const p=val.split('-'); d=new Date(+p[2],+p[1]-1,+p[0]); }
    if(isNaN(d)) return;
    if(!CAL[f.id]) CAL[f.id]={};
    Object.assign(CAL[f.id],{date:d,year:d.getFullYear(),month:d.getMonth(),open:false});
    const dv=document.getElementById('dv_'+f.id);
    if(dv){ dv.textContent=val; dv.classList.remove('empty'); }
  });
  allFields().filter(f=>f.type==='text').forEach(f=>{
    const inp=document.getElementById(f.id);
    if(inp&&entry[f.id]!==undefined){ inp.value=entry[f.id]; inp.classList.remove('pre'); }
  });
  clearStatus();
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showStatus(m,t){statusEl.textContent=m;statusEl.className='status '+t;}
function clearStatus(){statusEl.textContent='';statusEl.className='status';}

renderHistory();
</script>
</body>
</html>
